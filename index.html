<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#ffffff"/>
<title>Budget · Rafael</title>
<style>
:root{
  --bg:      #ffffff;
  --bg2:     #f8fafc;
  --bg3:     #f1f5f9;
  --bg4:     #e2e8f0;
  --label:   #0f172a;
  --label2:  #475569;
  --label3:  #94a3b8;
  --sep:     #e2e8f0;
  --green:   #10b981;
  --red:     #ef4444;
  --orange:  #f59e0b;
  --blue:    #3b82f6;
  --purple:  #8b5cf6;
  --teal:    #14b8a6;
  --r:       14px;

  /* Pastel palette */
  --p-affirm:    #ede9fe; --c-affirm:    #7c3aed;
  --p-paypal:    #dbeafe; --c-paypal:    #1d4ed8;
  --p-afterpay:  #d1fae5; --c-afterpay:  #059669;
  --p-klarna:    #fce7f3; --c-klarna:    #be185d;
  --p-sofi:      #e0f2fe; --c-sofi:      #0369a1;
  --p-sf:        #dcfce7; --c-sf:        #166534;
  --p-irs:       #fee2e2; --c-irs:       #dc2626;
  --p-cc:        #fef9c3; --c-cc:        #a16207;
  --p-gastos:    #f1f5f9; --c-gastos:    #475569;
  --p-avanche:   #fff7ed; --c-avalanche: #ea580c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--label);
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;
  padding-bottom:80px;padding-top:env(safe-area-inset-top);
}
.mono{font-family:"SF Mono","Menlo","Courier New",monospace}

/* ─ TOP BAR ─ */
#topbar{
  background:#fff;position:sticky;top:0;z-index:100;
  border-bottom:1px solid var(--sep);
  padding:14px 20px 12px;
}
#balance-val{
  font-family:-apple-system,"SF Pro Display",system-ui,sans-serif;
  font-size:40px;font-weight:700;letter-spacing:-1.5px;line-height:1;
  transition:color .3s;color:var(--green);
}

/* ─ STATS ─ */
.stats-row{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:10px;padding:14px 16px 0;
}
.stat-pill{
  background:var(--bg2);border-radius:12px;padding:10px 12px;
  border:1px solid var(--sep);
}
.stat-lbl{font-size:9px;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.stat-val{font-family:"SF Mono","Menlo",monospace;font-size:12px;font-weight:700}

/* ─ SECTION ─ */
.sec-hd{padding:20px 20px 8px;display:flex;justify-content:space-between;align-items:baseline}
.sec-title{font-size:20px;font-weight:700;letter-spacing:-.4px;color:var(--label)}
.sec-sub{font-size:13px;color:var(--label3)}

/* ─ ALERT ─ */
.alert{margin:10px 16px 0;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;display:none}
.alert-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.alert-amber{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}

/* ─ TRACKER ─ */
.tracker-card{margin:0 16px 14px;background:#fff;border-radius:var(--r);border:1px solid var(--sep);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tracker-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 10px;border-bottom:1px solid var(--sep)}
.tracker-title{font-size:15px;font-weight:700;color:var(--label)}
#tracker-list{max-height:400px;overflow-y:auto}

/* ─ PAYMENT ROW ─ */
.t-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f8fafc;transition:all .2s}
.t-row:last-child{border-bottom:none}
.t-row.paid{opacity:.4;background:#fafafa}
.t-row.is-avalanche{background:var(--p-avanche);border-left:3px solid var(--c-avalanche)}
.t-row.last-pay{background:#fffbeb}
.t-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.t-info{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:500;color:var(--label);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.t-date-line{font-size:11px;color:var(--label3);margin-top:1px}
.t-av-line{font-size:11px;color:var(--c-avalanche);font-weight:600;margin-top:2px}
.t-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.t-amt{font-family:"SF Mono","Menlo",monospace;font-size:13px;font-weight:600;color:var(--red)}
.t-amt.paid{color:var(--label3)}
.t-amt.avalanche-amt{color:var(--c-avalanche);font-size:14px;font-weight:700}
.t-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--bg4);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;color:var(--label3)}
.t-check.done{background:var(--green);border-color:var(--green);color:#fff}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px}
.badge-last{background:#fef9c3;color:#a16207}
.badge-av{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}
.badge-promo{background:#dcfce7;color:#166534}

/* ─ LIBERATION ─ */
.lib-banner{padding:10px 16px;background:#fffbeb;border-top:1px solid #fde68a;display:none}
.lib-title{font-size:12px;font-weight:700;color:#a16207;margin-bottom:2px}
.lib-item{font-size:11px;color:#b45309}

/* ─ MINI CAL ─ */
.mini-cal{margin:0 16px 14px;background:#fff;border-radius:var(--r);border:1px solid var(--sep);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mcal-month{font-size:13px;font-weight:600;color:var(--label2);text-align:center;margin-bottom:8px}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mcal-dow{text-align:center;font-size:9px;font-weight:700;color:var(--label3);padding:2px 0;margin-bottom:2px}
.mcal-day{display:flex;flex-direction:column;align-items:center;padding:3px 1px;border-radius:7px}
.mcal-day.is-pd{background:var(--label)}
.mcal-day.has-ev{background:var(--bg3)}
.mcal-day.in-period{background:var(--bg2)}
.mcal-num{font-size:10px;font-weight:400;color:var(--label3)}
.mcal-day.in-period .mcal-num{color:var(--label2);font-weight:500}
.mcal-day.is-pd .mcal-num{color:#fff;font-weight:700}
.mcal-dots{display:flex;gap:1px;margin-top:1px;min-height:4px}
.mcal-dot{width:3px;height:3px;border-radius:50%}

/* ─ NAV ─ */
.nav-row{display:flex;gap:10px;margin:0 16px 20px}
.nav-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--sep);background:#fff;color:var(--label2);font-size:13px;font-weight:500;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;transition:all .15s}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn:active:not(:disabled){background:var(--bg3);transform:scale(.98)}
.nav-main{flex:2;background:var(--label);color:#fff;border-color:var(--label);font-weight:700}
.nav-main:active{background:#1e293b}

/* ─ EXTRAS ─ */
.form-row{display:flex;gap:8px;margin-bottom:10px}
.form-input{background:var(--bg2);border:1px solid var(--sep);border-radius:10px;padding:10px 12px;color:var(--label);font-size:14px;outline:none;font-family:-apple-system,system-ui,sans-serif;transition:border .15s}
.form-input:focus{border-color:var(--blue)}
.form-input::placeholder{color:var(--label3)}
.btn-add{padding:10px 16px;border-radius:10px;border:none;background:var(--label);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;white-space:nowrap}
.btn-add:active{background:#1e293b}
.extra-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--sep)}
.extra-item:last-of-type{border-bottom:none}
.extra-del{background:none;border:none;cursor:pointer;color:var(--label3);font-size:18px;padding:0 4px;line-height:1}

/* ─ DEBT SCROLL ─ */
.debt-scroll{display:flex;gap:12px;padding:0 16px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:6px}
.debt-scroll::-webkit-scrollbar{display:none}
.debt-card{min-width:220px;border-radius:18px;padding:16px;scroll-snap-align:start;flex-shrink:0;cursor:pointer;transition:transform .15s;border:1px solid rgba(0,0,0,.06)}
.debt-card:active{transform:scale(.97)}
.d-icon{font-size:26px;margin-bottom:8px}
.d-name{font-size:14px;font-weight:700;color:var(--label);margin-bottom:1px}
.d-sub{font-size:11px;color:var(--label2);margin-bottom:12px}
.d-amt{font-family:"SF Mono","Menlo",monospace;font-size:22px;font-weight:700;color:var(--red);margin-bottom:8px}
.d-bar-bg{height:4px;border-radius:2px;background:rgba(0,0,0,.08)}
.d-bar{height:100%;border-radius:2px;transition:width .5s}
.d-footer{display:flex;justify-content:space-between;margin-top:5px}
.d-fl{font-size:11px;color:var(--label2)}
.d-fr{font-size:11px;font-weight:600}

/* ─ DETAIL ─ */
.detail-panel{margin:0 16px 14px;background:#fff;border-radius:var(--r);border:1px solid var(--sep);overflow:hidden;display:none;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.detail-panel.open{display:block}
.detail-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--sep)}
.detail-title{font-size:16px;font-weight:700}
.detail-close{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:none;cursor:pointer;color:var(--label2);font-size:13px;display:flex;align-items:center;justify-content:center}
.plan-row{padding:12px 16px;border-bottom:1px solid #f8fafc}
.plan-row:last-child{border-bottom:none}
.plan-name{font-size:13px;font-weight:600;margin-bottom:3px;color:var(--label)}
.p-bar-bg{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:5px}
.p-bar{height:100%;border-radius:2px}
.plan-chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500}
.chip-n{background:var(--bg3);color:var(--label2)}
.chip-l{background:#fef9c3;color:#a16207}
.cc-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid #f8fafc}
.cc-row:last-child{border-bottom:none}
.cc-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px}
.tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px}
.tag-r{background:#fef2f2;color:#dc2626}
.tag-g{background:#f0fdf4;color:#166534}

/* ─ BONUS ─ */
.bonus-input{flex:1;background:var(--bg2);border:1px solid var(--sep);border-radius:10px;padding:10px 12px;color:var(--label);font-size:15px;outline:none;font-family:"SF Mono","Menlo",monospace;transition:border .15s}
.bonus-input:focus{border-color:var(--blue)}
.bonus-input::placeholder{color:var(--label3)}
.bonus-btn{padding:10px 18px;border-radius:10px;border:none;background:var(--label);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:-apple-system,system-ui,sans-serif}
.alloc-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--sep)}
.alloc-row:last-child{border-bottom:none}
.card{background:#fff;border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;margin:0 16px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-inner{padding:14px 16px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px">BUDGET</div>
      <div id="pd-label" style="font-size:17px;font-weight:700;color:var(--label);letter-spacing:-.3px">Quincena 1</div>
      <div id="pd-range" style="font-size:12px;color:var(--label3);margin-top:1px"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:10px;color:var(--label3);margin-bottom:2px">Disponible</div>
      <div id="balance-val">$7,000</div>
    </div>
  </div>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-pill"><div class="stat-lbl">Sueldo</div><div class="stat-val" style="color:var(--green)">$7,000</div></div>
  <div class="stat-pill"><div class="stat-lbl">Pagado</div><div class="stat-val" id="s-paid" style="color:var(--red)">$0</div></div>
  <div class="stat-pill"><div class="stat-lbl">Extras</div><div class="stat-val" id="s-extra" style="color:var(--orange)">$0</div></div>
  <div class="stat-pill"><div class="stat-lbl">Buffer</div><div class="stat-val" id="s-buf" style="color:var(--purple)">$250</div></div>
  <div class="stat-pill"><div class="stat-lbl">Sobrante →</div><div class="stat-val" id="s-carry" style="color:var(--teal)">$0</div></div>
</div>

<div id="alert-def" class="alert alert-red"></div>
<div id="alert-av"  class="alert alert-amber"></div>
<div id="alert-carry" class="alert" style="background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4;"></div>

<!-- OVERDUE -->
<div id="overdue-section" style="margin:0 16px 14px;display:none">
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
    <span style="font-size:16px;font-weight:700;color:var(--label)">Pagos recientes</span>
    <span style="font-size:11px;background:#fef2f2;color:var(--red);padding:2px 8px;border-radius:20px;font-weight:600">May 21-28</span>
  </div>
  <div id="overdue-list" style="background:#fff;border-radius:var(--r);border:1px solid var(--sep);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)"></div>
</div>

<!-- TRACKER -->
<div class="sec-hd">
  <span class="sec-title">Pagos de la quincena</span>
  <span id="t-surplus" class="sec-sub"></span>
</div>
<div class="tracker-card">
  <div id="tracker-list"></div>
  <div class="lib-banner" id="lib-banner">
    <div class="lib-title" id="lib-title"></div>
    <div id="lib-items"></div>
  </div>
</div>

<!-- MINI CAL -->
<div class="mini-cal" id="mini-cal"></div>

<!-- NAV -->
<div class="nav-row">
  <button class="nav-btn" id="btn-prev" onclick="shift(-1)">← Anterior</button>
  <button class="nav-btn nav-main" onclick="close_period()">Cerrar + $250 buffer</button>
  <button class="nav-btn" id="btn-next" onclick="shift(1)">Siguiente →</button>
</div>
<div style="text-align:center;margin:-8px 16px 20px"><button onclick="resetAll()" style="background:none;border:none;color:var(--label3);font-size:12px;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;padding:4px 8px;">↺ Reiniciar datos</button></div>

<!-- EXTRAS -->
<div class="sec-hd"><span class="sec-title">Gastos Extras</span></div>
<div class="card"><div class="card-inner">
  <div class="form-row">
    <input class="form-input" id="ex-n" placeholder="Descripción (ej. cena, Uber)" style="flex:2"/>
    <input class="form-input" id="ex-a" type="number" placeholder="$0" style="flex:1;text-align:right;font-family:'SF Mono','Menlo',monospace"/>
    <button class="btn-add" onclick="addExtra()">Add</button>
  </div>
  <div id="extra-list"></div>
</div></div>

<!-- DEUDAS -->
<div class="sec-hd">
  <span class="sec-title">Deudas</span>
  <span class="sec-sub">toca para detalles →</span>
</div>
<div class="debt-scroll" id="debt-scroll"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-hd">
    <span class="detail-title" id="d-title"></span>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div id="d-body"></div>
</div>

<!-- BONUS -->
<div class="sec-hd"><span class="sec-title">Ganancias Extra</span></div>
<div class="card"><div class="card-inner">
  <div style="font-size:13px;color:var(--label2);margin-bottom:10px">Ingresa un bono y te digo qué hacer con él</div>
  <div class="form-row">
    <input class="bonus-input" id="bonus" type="number" placeholder="$10,000"/>
    <button class="bonus-btn" onclick="calcBonus()">Estrategia</button>
  </div>
  <div id="bonus-res"></div>
</div></div>

<!-- POST DEBT -->
<div id="post-debt"></div>

<script>
const SALARY=7000,BUF=250,CYCLE_START="2026-05-29";
const fmt=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(n);
const fmtS=d=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
function genPD(n=30){const r=[],s=new Date(CYCLE_START+"T12:00:00");for(let i=0;i<n;i++){const d=new Date(s);d.setDate(d.getDate()+i*14);r.push(d.toISOString().slice(0,10));}return r;}
const PD=genPD();
function bPd(due){let b=PD[0];for(const p of PD){if(p<=due)b=p;else break;}return b;}
function addMo(ds){const[y,m,d]=ds.split("-").map(Number);const nm=m%12+1,ny=m===12?y+1:y;return`${ny}-${String(nm).padStart(2,"0")}-${String(Math.min(d,new Date(ny,nm,0).getDate())).padStart(2,"0")}`;}

// Pastel styles per platform
const PC={
  "Affirm":    {bg:"#ede9fe",c:"#7c3aed",dot:"#a78bfa"},
  "PayPal Plans":{bg:"#dbeafe",c:"#1d4ed8",dot:"#60a5fa"},
  "Afterpay":  {bg:"#d1fae5",c:"#065f46",dot:"#34d399"},
  "Klarna":    {bg:"#fce7f3",c:"#9d174d",dot:"#f472b6"},
  "SoFi":      {bg:"#e0f2fe",c:"#075985",dot:"#38bdf8"},
  "Service Finance":{bg:"#dcfce7",c:"#14532d",dot:"#4ade80"},
  "IRS":       {bg:"#fee2e2",c:"#991b1b",dot:"#f87171"},
  "CC":        {bg:"#fef9c3",c:"#92400e",dot:"#fbbf24"},
  "Gastos":    {bg:"#f1f5f9",c:"#334155",dot:"#94a3b8"},
};
const ICONS={Affirm:"🅰️","PayPal Plans":"🅿️",Afterpay:"🛍️",Klarna:"🌸",SoFi:"💼","Service Finance":"🔧",IRS:"🏛️",CC:"💳"};

function buildEvents(){
  const evs=[];
  function plans(arr,pl){for(const[nm,nx,amt,l,rem,tot]of arr){let d=nx,orig=tot||amt*l;for(let i=0;i<l;i++){evs.push({date:d,name:nm,amt,platform:pl,isLast:i===l-1,rem:rem-i*amt,planTotal:orig});d=addMo(d);}}}
  plans([["WinkBeds","2026-06-05",383.01,1,383.01,2298.01],["Eight Sleep","2026-06-19",121.83,15,1827.50,4385.93],["Samsung Laundry","2026-05-25",77.08,3,231.34,1850.02],["Samsung Fridge","2026-05-25",93.57,3,280.71,2475.96],["Rare Carat","2026-05-25",233.60,1,233.60,1401.70],["Renegade Classics","2026-05-23",166.18,5,830.90,932.90],["Simpson Motorcycle","2026-06-02",96.37,17,1638.30,1428.15],["Business Class","2026-06-09",455.49,10,4554.93,4837.03],["Expedia Granada","2026-06-20",108.10,3,324.29,324.29],["Expedia Sevilla","2026-05-27",108.95,6,653.70,653.70],["Expedia Carlos III","2026-05-27",45.77,6,274.61,274.61],["Expedia Málaga","2026-05-27",99.31,6,595.87,595.87],["Margaritaville","2026-05-30",352.71,2,705.41,1058.12]],"Affirm");
  plans([["FC-Moto","2026-05-23",148.78,5,743.95,892.73],["MOTO Group","2026-05-30",131.81,11,1449.92,1581.73],["Ultra Empire","2026-05-31",122.18,11,1343.96,1466.14],["ENCQ","2026-06-16",183.41,7,1284.76,2201.81]],"PayPal Plans");
  plans([["IKEA","2026-06-14",183.62,8,1468.55,2203.03]],"Afterpay");

function renderMiniCal(p){
  const pd=new Date(p.pd+"T12:00:00");
  const y=pd.getFullYear(),m=pd.getMonth();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const nextPd=PERIODS[S.pidx+1]?.pd||"2099-12-31";
  const evMap={};
  for(const ev of p.evs){if(ev.date.slice(0,7)===p.pd.slice(0,7)){const d=parseInt(ev.date.slice(8));if(!evMap[d])evMap[d]=[];evMap[d].push(ev);}}
  const mn=pd.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  let h=`<div class="mcal-month">${mn}</div><div class="mcal-grid">`;
  ["D","L","M","X","J","V","S"].forEach(d=>{h+=`<div class="mcal-dow">${d}</div>`;});
  for(let i=0;i<fd;i++)h+=`<div></div>`;
  for(let day=1;day<=dim;day++){
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const isPd=ds===p.pd,inP=ds>=p.pd&&ds<nextPd,dots=evMap[day]||[];
    h+=`<div class="mcal-day${isPd?" is-pd":dots.length&&inP?" has-ev":inP?" in-period":""}">
      <span class="mcal-num">${day}</span>
      <div class="mcal-dots">${dots.slice(0,3).map(e=>`<div class="mcal-dot" style="background:${isPd?"rgba(255,255,255,.8)":((PC[e.platform]||PC.Gastos).dot)}"></div>`).join("")}</div>

  }
  h+=`</div>`;
  document.getElementById("mini-cal").innerHTML=h;
}

        <div class="plan-chips">${g.payments.slice(0,10).map(ev=>`<span class="chip ${ev.isLast?"chip-l":"chip-n"}">${fmtS(ev.date)}${ev.isLast?" ⭐":""}</span>`).join("")}${g.payments.length>10?`<span style="font-size:10px;color:var(--label3)"> +${g.payments.length-10} más</span>`:""}</div>
      </div>`;
    }).join("");
  }
}
function closeDetail(){document.getElementById("detail-panel").classList.remove("open");}

function renderPostDebt(){
  const sec=document.getElementById("post-debt");
  if(TOTAL_CC<1000){
    sec.innerHTML=`<div class="sec-hd"><span class="sec-title">Próximos Pasos</span></div>
    <div class="card" style="border-left:4px solid var(--green)"><div class="card-inner">
      <div style="font-size:18px;font-weight:700;color:var(--green);margin-bottom:12px">🎉 ¡Tarjetas pagadas!</div>
      ${[["🏦","Fondo de emergencia","$84,000 · $1,500/mes en HYSA 4%+"],["📈","Max 401(k)","$23,500/año · empieza con el match"],["🪺","Roth IRA","$7,000/año en Fidelity o Vanguard"],["🏠","Refinancia GMC","Score mejoró — busca tasa < 6%"],["💸","Regla 50/30/20","50% gastos · 30% gustos · 20% inversión"]].map(([ic,t,d])=>`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--sep)">
        <span style="font-size:20px">${ic}</span>
        <div><div style="font-size:13px;font-weight:600;color:var(--label)">${t}</div><div style="font-size:11px;color:var(--label2);margin-top:2px">${d}</div></div>
      </div>`).join("")}
    </div></div>`;
  }else{
    sec.innerHTML=`<div class="sec-hd"><span class="sec-title">Estrategia</span></div>
    <div class="card"><div class="card-inner">
      <div style="font-size:13px;color:var(--label2);margin-bottom:8px">Ejecuta el avalanche todos los meses. Esta sección se activa cuando la deuda CC llega a $0.</div>
      <div style="background:var(--bg2);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--label2)">CC restante</span>
        <span class="mono" style="font-size:13px;font-weight:700;color:var(--red)">${fmt(TOTAL_CC)}</span>
      </div>
    </div></div>`;
  }
}

function togglePaid(j){const k=`${S.pidx}-${j}`;S.paid[k]=!S.paid[k];save();render();}
function shift(d){const n=S.pidx+d;if(n>=0&&n<PERIODS.length){S.pidx=n;save();render();window.scrollTo({top:0,behavior:"smooth"});}}
function close_period(){
  const p=P();
  // Use TOTAL period obligations (not just marked-paid) — all bills settled when closing
  const extraAmt=S.extras.reduce((s,e)=>s+e.amt,0);
  const totalOut=p.total+extraAmt;
  const remaining=(SALARY+(S.carry||0))-totalOut;
  S.carry=Math.max(0,remaining-BUF);  // surplus after buffer carries forward
  S.buf+=BUF;
  // Mark all as paid when closing
  p.evs.forEach((_,j)=>{ S.paid[`${S.pidx}-${j}`]=true; });
  S.extras=[];
  if(S.pidx<PERIODS.length-1)S.pidx++;
  save();render();window.scrollTo({top:0,behavior:"smooth"});
}
function addExtra(){
  const n=document.getElementById("ex-n").value.trim(),a=parseFloat(document.getElementById("ex-a").value);
  if(!n||isNaN(a)||a<=0)return;
  S.extras.push({id:Date.now(),name:n,amt:a,date:new Date().toISOString().slice(0,10)});
  document.getElementById("ex-n").value="";document.getElementById("ex-a").value="";
  save();render();
}
function delExtra(i){S.extras.splice(i,1);save();render();}

function calcBonus(){
  const amt=parseFloat(document.getElementById("bonus").value);
  if(isNaN(amt)||amt<=0)return;
  const CCs=[{n:"Amex Platinum",b:22567,apr:29.99,i:22567*.2999/12},{n:"Citi Diamond",b:9299,apr:28.74,i:9299*.2874/12},{n:"BofA Platinum",b:2261,apr:28,i:2261*.28/12},{n:"Chase Freedom",b:8215,apr:26.49,i:8215*.2649/12},{n:"Apple Card",b:1949,apr:25.49,i:1949*.2549/12},{n:"PayPal CC",b:2292,apr:23.49,i:2292*.2349/12},{n:"Chase Amazon",b:7942,apr:22.74,i:7942*.2274/12},{n:"Sync GC",b:196,apr:0,i:0},{n:"Sync SW",b:3531,apr:0,i:0}];
  const alloc=[];let rem=amt;
  const ef=Math.min(rem,Math.min(amt*.1,1000));alloc.push({l:"🏦 Emergency Fund",a:ef,p:Math.round(ef/amt*100),r:"Colchón intocable — HYSA"});rem-=ef;
  for(const cc of CCs){if(rem<=0)break;const pay=Math.min(rem,cc.b);alloc.push({l:cc.n,a:pay,p:Math.round(pay/amt*100),apr:cc.apr,r:`Elimina ${fmt(cc.i)}/mes en intereses`,isCC:true});rem-=pay;if(rem<10)break;}
  if(rem>10)alloc.push({l:"Extra al IRS",a:rem,p:Math.round(rem/amt*100),r:"Adelanta el plan"});
  document.getElementById("bonus-res").innerHTML=`<div style="background:var(--bg2);border-radius:12px;overflow:hidden;margin-top:4px">
    <div style="padding:10px 14px;border-bottom:1px solid var(--sep);font-size:13px;font-weight:700;color:var(--label)">Asignación óptima de ${fmt(amt)}</div>
    ${alloc.map(a=>`<div class="alloc-row">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500;color:var(--label);display:flex;align-items:center;gap:6px">${a.l}${a.apr?`<span class="tag tag-r">${a.apr}%</span>`:""}</div>
        <div style="font-size:11px;color:var(--label2);margin-top:1px">${a.r}</div>
      </div>
      <div style="text-align:right">
        <div class="mono" style="font-size:15px;font-weight:700;color:${a.isCC?"var(--green)":"var(--purple)"}">${fmt(a.a)}</div>
        <div style="font-size:10px;color:var(--label3)">${a.p}%</div>
      </div>
    </div>`).join("")}
    <div style="padding:10px 14px;background:#f0fdf4;font-size:12px;font-weight:600;color:var(--green)">✅ Maximiza ahorro en intereses con avalanche</div>
  </div>`;
}


function renderOverdue(){
  const sec=document.getElementById("overdue-section");
  const list=document.getElementById("overdue-list");
  if(S.pidx!==0){sec.style.display="none";return;}
  sec.style.display="block";
  list.innerHTML=OVERDUE_EVENTS.map((ev,j)=>{
    const key="ov-"+j;
    const isPaid=!!S.ovPaid[key];
    const st=PC[ev.platform]||PC.Gastos;
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f8fafc;${isPaid?"opacity:.4;background:#fafafa":""}${ev.urgent&&!isPaid?";border-left:3px solid var(--red)":""}">
      <div style="width:32px;height:32px;border-radius:9px;background:${ev.urgent?"#fef2f2":st.bg};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">
        ${isPaid?'<span style="color:var(--green);font-size:14px">✓</span>':`<div style="width:7px;height:7px;border-radius:50%;background:${ev.urgent?"var(--red)":st.dot}"></div>`}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;color:var(--label);display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          ${ev.name}
          ${ev.urgent&&!isPaid?'<span style="font-size:9px;font-weight:700;background:#fef2f2;color:var(--red);padding:1px 6px;border-radius:20px">⚠️ PAGAR AHORA</span>':""}
          ${ev.isLast?'<span style="font-size:9px;font-weight:700;background:#fef9c3;color:#a16207;padding:1px 6px;border-radius:20px">⭐ ÚLTIMO</span>':""}
        </div>
        <div style="font-size:11px;color:var(--label3);margin-top:1px">${ev.date} · ${ev.note}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span class="mono" style="font-size:13px;font-weight:600;color:${isPaid?"var(--label3)":ev.urgent?"var(--red)":"var(--label2)"}">-${fmt(ev.amt)}</span>
        <button class="t-check${isPaid?" done":""}" onclick="toggleOv(${j})">${isPaid?"✓":"○"}</button>
      </div>
    </div>`;
  }).join("");
}

function toggleOv(j){
  const key="ov-"+j;
  S.ovPaid[key]=!S.ovPaid[key];
  save();render();
}

["ex-n","ex-a"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")addExtra();}));
document.getElementById("bonus").addEventListener("keydown",e=>{if(e.key==="Enter")calcBonus();});
render();
</script>
</body>
</html>
